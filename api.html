<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>随机图片 API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gBG 15s ease infinite;
            min-height: 100vh;
            color: #fff;
            padding: 15px;
            display: flex;
            justify-content: center
        }

        @keyframes gBG {

            0%,
            100% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }
        }

        .container {
            max-width: 1000px;
            width: 100%
        }

        .header {
            text-align: center;
            margin-bottom: 15px
        }

        .header h1 {
            font-size: 1.6rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3)
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-top: 3px
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 15px
        }

        .card h2 {
            font-size: 0.95rem;
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid #fff
        }

        .api-list {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .api-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: 0.2s;
            font-size: 0.85rem;
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font: inherit
        }

        .api-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(3px)
        }

        .api-list a[href="/refresh"],
        .api-list a[href="/classify"] {
            display: none
        }

        .api-code {
            font-family: Consolas, monospace;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.8rem
        }

        .api-desc {
            color: rgba(255, 255, 255, 0.8);
            flex: 1
        }

        .stats {
            display: flex;
            gap: 10px
        }

        .stat-item {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 12px;
            text-align: center
        }

        .stat-icon {
            font-size: 1.3rem
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem
        }

        .formats {
            display: flex;
            flex-wrap: wrap;
            gap: 6px
        }

        .format-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8)
        }

        .tip-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            border: 1px solid rgba(102, 126, 234, 0.5);
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
            font-size: 0.8rem
        }

        .tip-box code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            transition: 0.2s;
            font-size: 0.85rem
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2)
        }

        @media(max-width:700px) {
            .row {
                grid-template-columns: 1fr
            }

            .stats {
                flex-wrap: wrap
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ 随机图片 API</h1>
            <p>简单高效的随机图片接口服务</p>
        </div>

        <div class="row">
            <div class="card">
                <h2>📡 图片接口</h2>
                <div class="api-list">
                    <button type="button" class="api-item" id="session-btn"><span class="api-code">session</span><span
                            class="api-desc">Admin Login</span></button>
                    <button type="button" class="api-item" id="refresh-btn"><span class="api-code">POST /api/refresh</span><span
                            class="api-desc">Refresh image cache</span></button>
                    <button type="button" class="api-item" id="classify-btn"><span class="api-code">POST /api/classify</span><span
                            class="api-desc">Process inbox images</span></button>
                    <a href="/pic?img=h" class="api-item"><span class="api-code">/pic?img=h</span><span
                            class="api-desc">横屏随机图片</span></a>
                    <a href="/pic?img=v" class="api-item"><span class="api-code">/pic?img=v</span><span
                            class="api-desc">竖屏随机图片</span></a>
                    <a href="/pic?img=ua" class="api-item"><span class="api-code">/pic?img=ua</span><span
                            class="api-desc">根据设备自动选择</span></a>
                </div>
            </div>
            <div class="card">
                <h2>📊 当前统计</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-icon">🖥️</div>
                        <div class="stat-value" id="h-count">--</div>
                        <div class="stat-label">横屏</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">📱</div>
                        <div class="stat-value" id="v-count">--</div>
                        <div class="stat-label">竖屏</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon">📁</div>
                        <div class="stat-value" id="total-count">--</div>
                        <div class="stat-label">总计</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="card">
                <h2>🛠️ 管理接口</h2>
                <div class="api-list">
                    <a href="/refresh" class="api-item"><span class="api-code">/refresh</span><span
                            class="api-desc">刷新图片列表缓存</span></a>
                    <a href="/classify" class="api-item"><span class="api-code">/classify</span><span
                            class="api-desc">手动触发分类</span></a>
                </div>
                <div class="tip-box">💡 把图片放到 <code>ri/inbox</code> 目录会自动分类</div>
            </div>
            <div class="card">
                <h2>📋 支持格式</h2>
                <div class="formats" id="formats"></div>
            </div>
        </div>

        <div class="footer">
            <a href="/" class="back-btn">← 返回画廊</a>
        </div>
    </div>
    <script>
        const sessionBtn = document.getElementById('session-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const classifyBtn = document.getElementById('classify-btn');
        let adminSessionActive = false;

        function updateSessionButton() {
            sessionBtn.querySelector('.api-desc').textContent = adminSessionActive ? 'Admin Logout' : 'Admin Login';
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/images?type=all&page=1&pageSize=1', { cache: 'no-store' });
                const data = await res.json();
                document.getElementById('h-count').textContent = data.horizontal;
                document.getElementById('v-count').textContent = data.vertical;
                document.getElementById('total-count').textContent = data.horizontal + data.vertical;
            } catch {
            }
        }

        async function refreshAdminSession() {
            try {
                const res = await fetch('/api/admin/session', { cache: 'no-store' });
                const data = await res.json();
                adminSessionActive = Boolean(data && data.authenticated);
            } catch {
                adminSessionActive = false;
            }
            updateSessionButton();
        }

        async function loginAdminSession() {
            const password = (prompt('Enter admin password for this browser session') || '').trim();
            if (!password) return false;

            const res = await fetch('/api/admin/session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data.success) {
                adminSessionActive = false;
                updateSessionButton();
                alert(data.message || 'Login failed');
                return false;
            }

            adminSessionActive = true;
            updateSessionButton();
            return true;
        }

        async function logoutAdminSession() {
            try {
                await fetch('/api/admin/session', { method: 'DELETE' });
            } catch {
            }
            adminSessionActive = false;
            updateSessionButton();
        }

        async function ensureAdminSession() {
            if (adminSessionActive) return true;
            return loginAdminSession();
        }

        async function runManageAction(path) {
            const hasAdminSession = await ensureAdminSession();
            if (!hasAdminSession) return;

            const res = await fetch(path, { method: 'POST' });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data.success) {
                if (res.status === 403) {
                    adminSessionActive = false;
                    updateSessionButton();
                }
                alert(data.message || 'Request failed');
                return;
            }

            await loadStats();
            if (path === '/api/refresh') {
                alert(`Refresh complete. H ${data.horizontal}, V ${data.vertical}`);
                return;
            }
            alert(`Classify complete. Processed ${data.processed || 0}, skipped ${data.skipped || 0}, failed ${data.failed || 0}`);
        }

        sessionBtn.onclick = async () => {
            if (adminSessionActive) {
                await logoutAdminSession();
                return;
            }
            await loginAdminSession();
        };

        refreshBtn.onclick = () => runManageAction('/api/refresh');
        classifyBtn.onclick = () => runManageAction('/api/classify');
        loadStats();
        refreshAdminSession();
        document.getElementById('formats').innerHTML = ['.webp', '.avif', '.jpg', '.jpeg', '.png', '.gif', '.bmp', '.ico', '.svg'].map(f => `<span class="format-tag">${f}</span>`).join('');
    </script>
</body>

</html>
